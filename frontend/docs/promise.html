<p>pending &gt; settle (fulfilled via resolve or rejected via reject)</p>
<h5>concurrency</h5>
<p>
  Promise.all Promise.allSettled() Promise.any() Promise.race() - settles when 
  <strong>any</strong>
   of the promises settles. In other words, fulfills when any of the promises fulfills; rejects when
  any of the promises rejects
</p>
