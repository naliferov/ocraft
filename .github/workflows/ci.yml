name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Debug info
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "Triggered by: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo "Message: $COMMIT_MSG"
          echo "Timestamp: $(date)"
          node --version

      # Build the frontend HERE, on the runner — the droplet (~256MB RAM) OOMs on
      # `vite build`. We ship the built dist/ to the box instead of building there.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend (on runner)
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          APP_ORIGIN: ${{ secrets.APP_ORIGIN }}
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          KEY="-i /tmp/deploy_key -o StrictHostKeyChecking=no"
          HOST=root@165.232.75.109
          # 1) Write the prod .env from CI secrets + fetch the new code onto the box WITHOUT
          #    restarting — the live :80 keeps serving the OLD code (in memory) + OLD bundle, so this
          #    step is invisible to users. Record the current sha first (the rollback target).
          #    NODE_ENV=production -> Google-only auth + Secure cookies + HSTS, fails closed without
          #    Google/DATABASE_URL. Served HTTPS by Cloudflare -> origin :80 (BIND_HOST=0.0.0.0).
          ssh $KEY $HOST \
            "cd /root/ocraft && \
             git rev-parse HEAD > /tmp/ocraft_prev_sha && \
             printf 'TELEGRAM_BOT_TOKEN=%s\nDATABASE_URL=%s\nGOOGLE_CLIENT_ID=%s\nGOOGLE_CLIENT_SECRET=%s\nAPP_ORIGIN=%s\nNODE_ENV=production\nPORT=80\nBIND_HOST=0.0.0.0\n' '$TELEGRAM_BOT_TOKEN' '$DATABASE_URL' '$GOOGLE_CLIENT_ID' '$GOOGLE_CLIENT_SECRET' '$APP_ORIGIN' > .env && \
             git fetch origin && git reset --hard origin/main && \
             npm install"
          # 2) Stage the runner-built bundle at dist.new (NOT live yet — swapped in at cutover).
          rsync -az --delete -e "ssh $KEY" frontend/dist/ $HOST:/root/ocraft/frontend/dist.new/
          # 3) Tier-1 blue/green-lite cutover: migrate, pre-flight the new backend on :3002, and only
          #    if it boots+serves swap the bundle + restart :80 — else roll back. A bad deploy never
          #    takes :80 down. Logic in scripts/deploy-cutover.sh (brought over by the reset above).
          ssh $KEY $HOST "cd /root/ocraft && bash scripts/deploy-cutover.sh"
