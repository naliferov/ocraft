name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug info
        run: |
          echo "Triggered by: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo "Message: ${{ github.event.head_commit.message }}"
          echo "Timestamp: $(date)"
          node --version

      - name: Deploy
        env:
          NODE: /root/.nvm/versions/node/v25.8.2/bin/node
          NPM: /root/.nvm/versions/node/v25.8.2/bin/npm
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_HOST }} \
            "cd /root/ocraft && git pull && $NPM install && $NODE cli.js run deploy"
