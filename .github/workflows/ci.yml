name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Debug info
        run: |
          echo "Triggered by: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo "Message: ${{ github.event.head_commit.message }}"
          echo "Timestamp: $(date)"
          node --version

      - name: Deploy
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no root@165.232.75.109 \
            "cd /root/ocraft && \
             printf 'TELEGRAM_BOT_TOKEN=%s\nAPI_TOKEN=%s\n' '$TELEGRAM_BOT_TOKEN' '$API_TOKEN' > .env && \
             git pull && \
             npm install && \
             npm --prefix frontend install && \
             npm --prefix frontend run build && \
             node bin/cli.js run deploy"
